<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>🔍 AI Medical Chatbot</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
        }

        .chat-container {
            max-width: 750px;
            margin: 40px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1976d2;
            margin-bottom: 20px;
        }

        #chat-box {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .message {
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 75%;
            line-height: 1.4;
        }

        .user {
            background: #1976d2;
            color: white;
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            background: #eeeeee;
            color: #333;
            margin-right: auto;
            text-align: left;
            border-bottom-left-radius: 2px;
        }

        form {
            margin-top: 15px;
        }

        textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #1976d2;
        }

        button {
            margin-top: 10px;
            padding: 10px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #1976d2;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #0d47a1;
        }

        .clear-btn {
            background: #e53935;
        }

        .clear-btn:hover {
            background: #b71c1c;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <h1>🩺 AI Medical Chatbot</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <div id="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <strong>{{ msg.role|capitalize }}</strong><br />
                    {{ msg.content | safe | n12br }}
                </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('index') }}">
            <textarea name="prompt" placeholder="Ask a medical question..." required></textarea>
            <button type="submit">Send</button>
        </form>

        <form method="get" action="{{ url_for('clear') }}">
            <button type="submit" class="clear-btn">Clear Chat</button>
        </form>
    </div>
</body>
</html>
